name: Build

on:
  push:
    branches: [ master ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure (x86)
        run: cmake -G "Visual Studio 17 2022" -A Win32 -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canlib32
          path: dist/canlib32.dll

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/canlib32.dll
